<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Công nghệ inverter tiết kiệm điện">
  <rect width="800" height="600" fill="#0f172a"/>
  <g font-family="Inter, Arial, sans-serif" fill="#ffd953">
    <text x="400" y="200" text-anchor="middle" font-size="60" font-weight="800">INVERTER</text>
    <text x="400" y="260" text-anchor="middle" font-size="24" fill="#fff">Tiết kiệm điện đến 35%</text>
  </g>
  <g transform="translate(200,320)" font-family="Inter, Arial, sans-serif">
    <rect width="140" height="120" rx="14" fill="#1f2937"/>
    <text x="70" y="50" text-anchor="middle" fill="#ffd953" font-size="32">⚡</text>
    <text x="70" y="90" text-anchor="middle" fill="#fff" font-size="14">Khởi động êm</text>
  </g>
  <g transform="translate(360,320)" font-family="Inter, Arial, sans-serif">
    <rect width="140" height="120" rx="14" fill="#1f2937"/>
    <text x="70" y="50" text-anchor="middle" fill="#ffd953" font-size="32">🔇</text>
    <text x="70" y="90" text-anchor="middle" fill="#fff" font-size="14">Vận hành êm</text>
  </g>
  <g transform="translate(520,320)" font-family="Inter, Arial, sans-serif">
    <rect width="140" height="120" rx="14" fill="#1f2937"/>
    <text x="70" y="50" text-anchor="middle" fill="#ffd953" font-size="32">🛡️</text>
    <text x="70" y="90" text-anchor="middle" fill="#fff" font-size="14">An toàn cao</text>
  </g>
</svg>
